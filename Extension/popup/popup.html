<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Log Analyzer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Log Analyzer</h1>
      <p>Configura tu API Key de Gemini para activar el analisis con IA.</p>
    </div>

    <div class="input-group">
      <label for="apiKey">Gemini API Key</label>
      <input type="password" id="apiKey" placeholder="AIzaSy...">
    </div>

    <button id="saveBtn">Guardar</button>
    <div id="status" class="status-msg hidden"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
